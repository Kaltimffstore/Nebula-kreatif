        const TIER_RULES = {

        // Referensi DOM

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString('id-ID');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.classList.remove('counting');
                    obj.style.color = '#f59e0b';
                    obj.style.textShadow = '0 0 15px rgba(245, 158, 11, 0.8)';
                }
            };
            obj.classList.add('counting');
            window.requestAnimationFrame(step);
        }

        // ============================================================================
        // OMNI-EXPANDER ENGINE (HANYA MEMODIFIKASI KATA DASAR SASTRAWI)
        // ============================================================================
        function expandDatabaseTo100k() {
            statusText.innerText = "Isolasi Selesai. Menjalankan Ekspansi Aman...";
            
            // 1. Masukkan semua kata kebal (Protected) ke dalam wadah akhir tanpa diubah
            for (let w of protectedWords) {
                uniqueWords.add(w);
            }
            
            let currentSize = uniqueWords.size;
            const rootWords = Array.from(expandableWords);
            const targetSize = 101491; // Target persis seperti game
            
            // 2. Lakukan kloning HANYA pada kata Sastrawi yang aman
            for (let i = 0; i < rootWords.length; i++) {
                let w = rootWords[i];
                
                uniqueWords.add(w);
                
                // Syarat ketat agar kloning masuk akal: 
                // Tidak boleh kata berakhiran huruf asing, dan panjang min 3 huruf.
                if (w.length >= 3 && !/[xvqzwyfj]$/.test(w)) {
                    uniqueWords.add(w + 'nya');
                    uniqueWords.add(w + 'mu');
                    uniqueWords.add(w + 'ku');
                    if(!w.endsWith('kan')) uniqueWords.add(w + 'kan');
                    if(!w.endsWith('an')) uniqueWords.add(w + 'an');
                    
                    if (!w.startsWith('di')) uniqueWords.add('di' + w);
                    if (!w.startsWith('ter')) uniqueWords.add('ter' + w);
                    if (!w.startsWith('me')) uniqueWords.add('me' + w);
                    if (!w.startsWith('pe')) uniqueWords.add('pe' + w);
                }
                
                if (uniqueWords.size >= targetSize) break;
            }

            baseDictionary = Array.from(uniqueWords);
            
            animateValue(wordCounter, currentSize, baseDictionary.length, 1500);

            setTimeout(() => {
                statusIndicator.className = 'w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_10px_#f59e0b]';
                statusText.innerText = `FIREWALL AKTIF. 100K+ DATA AMAN TERSINKRONISASI.`;
                statusText.className = 'text-xs font-black text-amber-500 tracking-widest uppercase';
                searchInput.placeholder = "KETIK AWALAN...";
                searchInput.disabled = false;
                searchInput.focus();
                applyModeAndSort('normal');
            }, 1600);
        }

        async function initDatabase() {
            try {
                // FUNGSI INJEKSI KE RUANG ISOLASI (PROTECTED DATA)
                const injectProtected = (dataString) => {
                    const words = dataString.split(/[\s,\n]+/);
                    for (let w of words) {
                        let cleanWord = w.replace(/[^a-zA-Z]/g, '').toLowerCase();
                        if (cleanWord.length > 2 && !BLACKLIST.has(cleanWord)) {
                            protectedWords.add(cleanWord);
                        }
                    }
                };

                injectProtected(MASTER_USER_ARCHIVE);
                injectProtected(BRAND_AND_TECH);
                injectProtected(NGA_NGI_NGO_NGE);
                injectProtected(COUNTRIES);
                injectProtected(PURE_SCIENCE);
                
                GUARANTEED_KILLERS.forEach(word => {
                    protectedWords.add(word.toLowerCase());
                });

                wordCounter.innerText = protectedWords.size.toLocaleString('id-ID');

                // UNDUH KATA DASAR (Untuk diumpankan ke Omni-Expander)
                const res = await fetch(DB_URL);
                if (res.ok) {
                    const text = await res.text();
                    const rawWords = text.split('\n');
                    const validRegex = /^[a-z]+$/;
                    
                    for (let w of rawWords) {
                        let cleanWord = w.trim().toLowerCase();
                        // Hanya masukkan jika bukan Blacklist dan belum ada di Protected
                        if (cleanWord.length > 2 && validRegex.test(cleanWord) && !BLACKLIST.has(cleanWord) && !protectedWords.has(cleanWord)) {
                            expandableWords.add(cleanWord);
                        }
                    }
                    
                    setTimeout(() => expandDatabaseTo100k(), 300);
                }

            } catch (error) {
                statusIndicator.className = 'w-3 h-3 rounded-full bg-orange-500';
                statusText.innerText = "OFFLINE MODE. MENYIAPKAN MASTER CACHE...";
                expandDatabaseTo100k();
            }
        }

        function applyModeAndSort(tierMode) {
            currentTier = tierMode;
            
            if (tierMode === 'normal') {
                searchContainer.classList.replace('border-zinc-800', 'border-amber-900');
                searchInput.classList.replace('focus:border-red-600', 'focus:border-amber-500');
                searchIcon.classList.replace('text-red-500', 'text-amber-500');
                resultCount.className = 'text-amber-400 bg-amber-950/40 px-3 py-1 rounded';
                activeModeLabel.className = 'text-amber-500';
                activeModeLabel.innerText = `MODE AKTIF: NORMAL (KATA VALID DIACAK)`;
                emptyTitle.className = 'text-amber-500/80 text-2xl font-black uppercase tracking-widest';
            } else {
                searchContainer.classList.replace('border-amber-900', 'border-zinc-800');
                searchInput.classList.replace('focus:border-amber-500', 'focus:border-red-600');
                searchIcon.classList.replace('text-amber-500', 'text-red-500');
                resultCount.className = 'text-red-500 bg-red-950/30 px-3 py-1 rounded';
                activeModeLabel.className = 'text-red-500';
                emptyTitle.className = 'text-red-600/80 text-2xl font-black uppercase tracking-widest';
                
                const labels = {
                    'tier1': 'MODE AKTIF: HARDCORE TIER 1 (1 HURUF)',
                    'tier2': 'MODE AKTIF: HARDCORE TIER 2 (2 HURUF)',
                    'tier3': 'MODE AKTIF: HARDCORE TIER 3 (3 HURUF)'
                };
                activeModeLabel.innerText = labels[tierMode];
                
                const rules = TIER_RULES[tierMode];
                sortedDictionary = baseDictionary.map(word => {
                    let score = 0;
                    let matchedSuffix = null;
                    let label = 'BIASA';

                    for (let s of rules.kiamat) { if (word.endsWith(s)) { score = 10000; matchedSuffix = s; label = 'KIAMAT'; break; } }
                    if (score === 0) {
                        for (let s of rules.fatal) { if (word.endsWith(s)) { score = 5000; matchedSuffix = s; label = 'FATAL'; break; } }
                    }
                    if (score === 0 && rules.sulit) {
                        for (let s of rules.sulit) { if (word.endsWith(s)) { score = 2000; matchedSuffix = s; label = 'SULIT'; break; } }
                    }

                    return { word, score, suffix: matchedSuffix, label };
                });

                sortedDictionary.sort((a, b) => b.score !== a.score ? b.score - a.score : b.word.length - a.word.length);
            }

            const currentInput = searchInput.value.toLowerCase().trim();
            if (currentInput) searchWords(currentInput);
        }

        window.changeTier = function(tierMode) {
            if (baseDictionary.length > 0) {
                applyModeAndSort(tierMode);
                searchInput.focus();
            }
        };

        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function renderResults(results) {
            resultsContainer.innerHTML = '';
            
            if (results.length === 0) {
                emptyState.classList.remove('hidden');
                resultCount.innerText = "0 KATA";
                return;
            }

            emptyState.classList.add('hidden');
            resultCount.innerText = `${results.length === 150 ? '150+ (MAX)' : results.length} KATA`;

            const fragment = document.createDocumentFragment();

            for (let i = 0; i < results.length; i++) {
                const item = results[i];
                const card = document.createElement('div');
                
                let borderColor = 'border-zinc-800';
                let bgClass = 'bg-zinc-900/50';
                let textHighlight = 'text-zinc-400';
                let badge = '';

                if (currentTier === 'normal') {
                    borderColor = 'border-amber-900/50 hover:border-amber-500';
                    bgClass = 'bg-zinc-900 hover:bg-amber-950/40';
                    card.className = `relative p-4 rounded-xl border-2 ${borderColor} ${bgClass} transition-all cursor-pointer flex flex-col items-center justify-center group select-none shadow-lg overflow-hidden`;
                    
                    card.innerHTML = `
                        <div class="absolute -right-4 -bottom-4 w-12 h-12 bg-amber-600/10 blur-xl rounded-full group-hover:bg-amber-500/20 transition-all"></div>
                        <div class="text-[1.15rem] font-bold tracking-widest text-zinc-100 uppercase w-full text-center relative z-10">${item.word}</div>
                        <div class="text-[10px] text-amber-500 font-black mt-1.5 opacity-50 group-hover:opacity-100 transition-opacity uppercase tracking-widest relative z-10">${item.word.length} Huruf</div>
                    `;
                } else {
                    if (item.score >= 10000) {
                        borderColor = 'border-red-600 shadow-[0_0_15px_rgba(220,38,38,0.4)]';
                        bgClass = 'bg-red-950/50 hover:bg-red-900/70';
                        textHighlight = 'text-red-500 font-black text-glow';
                        badge = `<span class="absolute -top-2.5 -right-2.5 bg-red-600 text-white text-[9px] font-black px-2 py-0.5 rounded shadow-lg uppercase tracking-widest border border-red-400/50">${item.label}</span>`;
                    } else if (item.score >= 5000) {
                        borderColor = 'border-orange-600/60 shadow-[0_0_10px_rgba(234,88,12,0.2)]';
                        bgClass = 'bg-orange-950/40 hover:bg-orange-900/50';
                        textHighlight = 'text-orange-500 font-bold';
                        badge = `<span class="absolute -top-2.5 -right-2.5 bg-orange-600 text-white text-[9px] font-black px-2 py-0.5 rounded shadow-lg uppercase tracking-widest border border-orange-400/50">${item.label}</span>`;
                    } else if (item.score >= 2000) {
                        borderColor = 'border-yellow-700/40';
                        bgClass = 'bg-yellow-950/20 hover:bg-yellow-900/40';
                        textHighlight = 'text-yellow-500 font-bold';
                    } else {
                        bgClass = 'bg-zinc-900/80 hover:bg-zinc-800';
                    }

                    card.className = `relative p-4 rounded-xl border-2 ${borderColor} ${bgClass} transition-all cursor-pointer flex items-center justify-center group select-none shadow-lg`;
                    
                    let displayWord = item.word;
                    if (item.suffix) {
                        const suffixLen = item.suffix.length;
                        const basePart = item.word.slice(0, -suffixLen);
                        const suffixPart = item.word.slice(-suffixLen);
                        displayWord = `<span class="text-zinc-300">${basePart}</span><span class="${textHighlight} transition-all uppercase">${suffixPart}</span>`;
                    }

                    card.innerHTML = `
                        <div class="text-[1.15rem] font-bold tracking-widest w-full text-center relative z-10">${displayWord}</div>
                        ${badge}
                    `;
                }

                card.addEventListener('click', () => {
                    navigator.clipboard.writeText(item.word);
                    const origContent = card.innerHTML;
                    
                    if (currentTier === 'normal') {
                        card.innerHTML = `<div class="text-amber-500 font-black text-sm w-full text-center uppercase tracking-widest leading-loose glow-gold">DISALIN!</div>`;
                    } else {
                        card.innerHTML = `<div class="text-red-500 font-black text-sm w-full text-center uppercase tracking-widest leading-loose glow-red">DISALIN!</div>`;
                    }
                    
                    setTimeout(() => {
                        searchInput.value = '';
                        searchInput.focus();
                        renderResults([]);
                    }, 300);
                });

                fragment.appendChild(card);
            }

            resultsContainer.appendChild(fragment);
        }

        function searchWords(query) {
            if (!query) {
                renderResults([]);
                return;
            }

            let matches = [];

            if (currentTier === 'normal') {
                for (let i = 0; i < baseDictionary.length; i++) {
                    if (baseDictionary[i].startsWith(query)) {
                        matches.push({ word: baseDictionary[i] });
                    }
                }
                matches = shuffleArray(matches).slice(0, 150);
            } else {
                for (let i = 0; i < sortedDictionary.length; i++) {
                    if (sortedDictionary[i].word.startsWith(query)) {
                        matches.push(sortedDictionary[i]);
                        if (matches.length >= 150) break; 
                    }
                }
            }

            renderResults(matches);
        }

        searchInput.addEventListener('input', (e) => {
            searchWords(e.target.value.toLowerCase().trim());
        });

        window.onload = initDatabase;

    </script>
